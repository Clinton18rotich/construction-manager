<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff}
.header{background:#1a1a1a;padding:12px;text-align:center;border-bottom:2px solid #ff9f0a;position:sticky;top:0;z-index:100}
.header h1{color:#ff9f0a;font-size:18px}
.nav{display:flex;overflow-x:auto;background:#1c1c1e;gap:4px;padding:8px;position:sticky;top:56px;z-index:99}
.nav button{flex:0 0 auto;background:#2c2c2e;color:#fff;border:none;padding:8px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;font-size:12px}
.nav button.active{background:#ff9f0a;color:#000;font-weight:bold}
.content{padding:15px;max-width:900px;margin:0 auto;padding-bottom:100px}
label{display:block;margin:10px 0 3px;color:#aaa;font-size:12px;font-weight:bold}
input,select,textarea{width:100%;padding:10px;background:#1c1c1e;border:1px solid #333;color:#fff;border-radius:8px;font-size:14px;margin-bottom:5px}
textarea{min-height:70px;resize:vertical}
.btn{background:#ff9f0a;color:#000;border:none;padding:10px 20px;border-radius:8px;font-weight:bold;cursor:pointer;margin:8px 4px 8px 0;font-size:13px}
.btn-blue{background:#0a84ff;color:#fff}
.btn-red{background:#ff3b30;color:#fff}
.btn-green{background:#30d158;color:#000}
.btn-sm{padding:6px 12px;font-size:11px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row>*{flex:1;min-width:120px}
table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
th,td{border:1px solid #333;padding:5px;text-align:left;vertical-align:top}
th{background:#1c1c1e;color:#ff9f0a;font-size:11px}
.card{background:#1c1c1e;border-radius:10px;padding:12px;margin:8px 0;border:1px solid #333}
.card h4{margin-bottom:8px;color:#ff9f0a}
.chip{display:inline-block;background:#333;color:#fff;padding:4px 10px;border-radius:12px;margin:2px;font-size:11px;cursor:pointer}
.chip.selected{background:#ff9f0a;color:#000}
.chip-grid{display:flex;flex-wrap:wrap;gap:4px;margin:5px 0}
.tag{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;margin:2px}
.tag-pass{background:#30d158;color:#000}
.tag-fail{background:#ff3b30;color:#fff}
.tag-open{background:#ff9f0a;color:#000}
.tag-closed{background:#30d158;color:#000}
.report-preview{background:#fff;color:#000;padding:20px;border-radius:8px;font-family:'Courier New',monospace;font-size:11px;line-height:1.5}
.report-preview h3{text-align:center;text-transform:uppercase;font-size:13px}
.report-preview h4{font-size:12px;margin-top:10px}
.report-preview hr{border:1px solid #000}
.report-preview table{border:1px solid #000;font-size:10px}
.report-preview th,.report-preview td{border:1px solid #000;color:#000;padding:3px}
.report-preview th{background:#ddd}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ff9f0a;color:#000;padding:10px 20px;border-radius:20px;font-weight:bold;display:none;z-index:1000}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:#1c1c1e;padding:20px;border-radius:12px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
@media print{body{background:#fff;color:#000}.header,.nav,.btn,.toast{display:none}.content{padding:0}.report-preview{border-radius:0}}
</style>
</head>

function nav(){
let h='';
for(let i=0;i<NAV.length;i++){
h+='<button class="'+(NAV[i].id===current?'active':'')+'" onclick="go(\''+NAV[i].id+'\')">'+NAV[i].label+'</button>';
}
document.getElementById('nav').innerHTML=h;

var gdl=document.getElementById('globalDateLabel');if(gdl)gdl.textContent=fmtGlobalDate();
}
function go(id){
current=id;nav();
document.getElementById('content').innerHTML=RENDER[id]?RENDER[id]():'';
if(id!=='report')bindInputs();
window.scrollTo(0,0);
}
function toast(m){
let t=document.getElementById('toast');
t.textContent=m;t.style.display='block';
setTimeout(function(){t.style.display='none';},2000);
}
function bindInputs(){
document.querySelectorAll('input,select,textarea').forEach(function(el){
el.addEventListener('input',function(){
if(this.id && this.id.startsWith('_'))return;
if(this.id)D[this.id]=this.value;
save();
});
if(D[el.id]!==undefined && el.type!=='file')el.value=D[el.id];
});
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function fmtDate(ts){return new Date(ts).toISOString().split('T')[0];}
function today(){return new Date().toISOString().split('T')[0];}
function setGlobalDate(d){globalDate=d;go(current);}
function fmtGlobalDate(){return new Date(globalDate).toLocaleDateString('en-KE',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}

function addItem(arr,item){
if(!D[arr])D[arr]=[];
D[arr].push(item);save();
}
function delItem(arr,id){
D[arr]=D[arr].filter(function(i){return i.id!==id;});
save();
}

var insp=(D.inspections||[]).filter(function(e){return e.date===globalDate;});

var lab=(D.labour||[]).filter(function(e){return e.date===globalDate;});

var delays=(D.delays||[]).filter(function(e){return e.date===globalDate;});
var mats=(D.materials||[]).filter(function(e){return e.date===globalDate;});
var meets=(D.meetings||[]).filter(function(e){return e.date===globalDate;});

for(var i=0;i<lab.length;i++){totalLabour+=parseInt(lab[i].mainCount||0)+parseInt(lab[i].subCount||0);}

for(var i=0;i<insp.length;i++){for(var j=0;j<insp[i].items.length;j++){inspTotal++;if(insp[i].items[j].pass)inspPassed++;}}

if(D.weatherMorning==="Sunny")weatherIcon="☀️";
else if(D.weatherMorning==="Rainy")weatherIcon="🌧️";
else if(D.weatherMorning==="Cloudy")weatherIcon="☁️";
var dateStr=new Date().toLocaleDateString("en-KE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

var recentActivity="";
var allToday=[].concat(
diaries.map(function(e){return{type:"diary",time:new Date(e.timestamp).toLocaleTimeString(),text:e.activity+" — "+e.location};}),
insp.map(function(e){return{type:"inspection",time:"Today",text:e.phase+" at "+e.location};}),
mats.map(function(e){return{type:"material",time:"Today",text:e.name+" — "+e.qty+" "+e.unit};})
);
allToday.sort(function(a,b){return a.time<b.time?1:-1;});
for(var i=0;i<Math.min(allToday.length,5);i++){
var icon=allToday[i].type==="diary"?"📔":allToday[i].type==="inspection"?"✅":"🧱";
recentActivity+='<div style="padding:8px;border-bottom:1px solid #222;display:flex;gap:8px;align-items:center"><span style="font-size:16px">'+icon+'</span><div><small style="color:#888">'+allToday[i].time+'</small><br>'+allToday[i].text+'</div></div>';
}
if(!recentActivity)recentActivity='<p style="color:#666;padding:12px;text-align:center">No activity for this date. Select a date or tap quick buttons to add entries.</p>';

return '<div style="text-align:center;padding:10px 0">'+
'<h2 style="color:#ff9f0a;font-size:22px;margin:0">🏗️ CONSTRUCTION MANAGER</h2>'+
'<p style="color:#aaa;font-size:13px;margin:4px 0">'+dateStr+'</p>'+
'<p style="font-size:28px;margin:5px 0">'+weatherIcon+' <span style="font-size:13px;color:#aaa">'+(D.tempNotes||D.weatherMorning||"Tap ⚙️ Settings for weather")+'</span></p>'+
'</div>'+

'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0">'+
'<div class="card" style="text-align:center;cursor:pointer" onclick="go(\'diary\')"><div style="font-size:28px">📔</div><div style="font-size:22px;font-weight:bold;color:#ff9f0a">'+diaries.length+'</div><small style="color:#aaa">Diary</small></div>'+
'<div class="card" style="text-align:center;cursor:pointer" onclick="go(\'inspections\')"><div style="font-size:28px">✅</div><div style="font-size:22px;font-weight:bold;color:'+(inspTotal>0&&inspPassed===inspTotal?'#30d158':'#ff9f0a')+'">'+(inspTotal>0?inspPassed+'/'+inspTotal:'0')+'</div><small style="color:#aaa">Inspections</small></div>'+

RENDER['labour']=function(){
var list='';

var todayLab=lab.filter(function(e){return e.date===today();});
if(todayLab.length===0){
list='<p style="color:#666">No labour logged for today.</p>';
}else{
var trades=['Site Agent','Masons','Carpenters','Steel Fixers','Plumbers','Painters','General','Other'];
for(var t=0;t<trades.length;t++){
var main=0,sub=0;
for(var l=0;l<todayLab.length;l++){
if(todayLab[l].trade===trades[t]){
main+=parseInt(todayLab[l].mainCount)||0;
sub+=parseInt(todayLab[l].subCount)||0;
}
}
if(main>0||sub>0){
list+='<tr><td>'+trades[t]+'</td><td>'+main+'</td><td>'+sub+'</td></tr>';
}
}
if(list.indexOf('<tr>')===-1)list='<p style="color:#666">No labour logged for today.</p>';
else list='<table><tr><th>Trade</th><th>Main Contractor</th><th>Sub-Contractor</th></tr>'+list+'</table>';
}
return '<h2>👷 Labour & Attendance</h2><p style="color:#aaa;font-size:12px">Date: '+today()+'</p>'+list+
'<button class="btn btn-blue" onclick="showLabourForm()">+ Add Labour</button>';
};

addItem('delays',{
id:uid(),category:document.getElementById('_delayCat').value,

// ============ REPORT (Cowlog Pro Format) ============
var globalDate=today();
var reportDate=globalDate;
function changeDate(days){
var d=new Date(reportDate);
d.setDate(d.getDate()+days);
var nd=d.toISOString().split('T')[0];
if(nd<=today())reportDate=nd;
go('report');
}
function rdate(){return new Date(reportDate).toLocaleDateString('en-KE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}

RENDER['report']=function(){
reportDate=globalDate;
var dt=(D.diaries||[]).filter(function(e){return e.date===reportDate;});
var insp=(D.inspections||[]).filter(function(e){return e.date===reportDate;});
var ncrs=(D.ncrs||[]).filter(function(e){return e.date===reportDate;});
var sis=(D.instructions||[]).filter(function(e){return e.date===reportDate;});
var delays=(D.delays||[]).filter(function(e){return e.date===reportDate;});
var mats=(D.materials||[]).filter(function(e){return e.date===reportDate;});
var lab=(D.labour||[]).filter(function(e){return e.date===reportDate;});
var plant=(D.plant||[]).filter(function(e){return e.status==='Active'||e.status==='Idle';});
var meets=(D.meetings||[]).filter(function(e){return e.date===reportDate;});
var reportsToday=(D.savedReports||[]).filter(function(e){return e.date===reportDate;}).length+1;
var rn='COW/'+reportsToday+'/'+reportDate.substring(0,4);
var isToday=reportDate===today();
var totalWorkers=0;
for(var i=0;i<lab.length;i++){totalWorkers+=parseInt(lab[i].mainCount||0)+parseInt(lab[i].subCount||0);}

// Build work progress from diary
var workText='';
for(var i=0;i<dt.length;i++){
workText+=dt[i].activity+' — '+dt[i].location+'\\n'+dt[i].obs+(dt[i].remarks?' ('+dt[i].remarks+')':'')+'\\n\\n';
}
if(!workText)workText='No diary entries for this date.\\n';

// Build labour table
var labourTable='';
var trades=['Site Agent','Masons','Carpenters','Steel Fixers','Plumbers','Painters','General','Other'];
for(var t=0;t<trades.length;t++){
var m=0,s=0;
for(var l=0;l<lab.length;l++){if(lab[l].trade===trades[t]){m+=parseInt(lab[l].mainCount||0);s+=parseInt(lab[l].subCount||0);}}
if(m>0||s>0)labourTable+='<tr><td>'+trades[t]+'</td><td>'+m+'</td><td>'+s+'</td></tr>';
}
if(!labourTable)labourTable='<tr><td colspan="3">No labour recorded</td></tr>';

// Build plant table
var plantTable='';
for(var i=0;i<plant.length;i++){
plantTable+='<tr><td>'+plant[i].name+'</td><td>'+(plant[i].qty||'1')+'</td><td>'+plant[i].status+'</td></tr>';
}
if(!plantTable)plantTable='<tr><td colspan="3">No plant recorded</td></tr>';

// Build materials
var matText='';
for(var i=0;i<mats.length;i++){
matText+=(i+1)+'. '+mats[i].name+' — '+mats[i].qty+' '+mats[i].unit+' from '+mats[i].source+'\\n';
}
if(!matText)matText='No deliveries recorded.\\n';

// Build inspections
var inspText='';
for(var i=0;i<insp.length;i++){
var p=0,f=0;
for(var j=0;j<insp[i].items.length;j++){if(insp[i].items[j].pass)p++;else f++;}
inspText+=insp[i].phase+' at '+insp[i].location+': '+p+'/'+(p+f)+' passed\\n';
}
if(!inspText)inspText='No inspections recorded.\\n';

// Build NCRs
var ncrText='';
for(var i=0;i<ncrs.length;i++){
ncrText+=(i+1)+'. '+ncrs[i].title+' ('+ncrs[i].severity+') — '+ncrs[i].desc.substring(0,80)+'... ['+ncrs[i].status+']\\n';
}
if(!ncrText)ncrText='No NCRs raised.\\n';

// Build SIs
var siText='';
for(var i=0;i<sis.length;i++){
siText+=(i+1)+'. To: '+sis[i].issuedTo+' — '+sis[i].desc.substring(0,60)+'... (Deadline: '+sis[i].deadline+')\\n';
}
if(!siText)siText='No site instructions issued.\\n';

// Build delays
var delayText='';
var totalHrs=0;
for(var i=0;i<delays.length;i++){
delayText+=delays[i].cause+' — '+delays[i].duration+' hrs ('+delays[i].impact+')\\n';
totalHrs+=parseInt(delays[i].duration||0);
}
if(!delayText)delayText='No delays recorded.\\n';

// Build meetings
var meetText='';
for(var i=0;i<meets.length;i++){
meetText+=meets[i].meetingNo+' at '+meets[i].venue+': '+meets[i].agenda.substring(0,60)+'...\\n';
}

return '<div style="background:#2C2C2E;border-radius:8px;padding:8px;margin-bottom:10px">'+
'<div style="text-align:center"><label style="color:#F78166;font-size:12px">📅 Select Report Date:</label><br>'+
'<input type="date" id="_reportDatePicker" value="'+reportDate+'" max="'+today()+'" style="width:auto;display:inline-block;font-size:16px;text-align:center;background:#333;color:#fff;border:1px solid #ff9f0a;border-radius:8px;padding:8px;margin:5px 0" onchange="reportDate=this.value;go(\'report\')">'+
'<br><small style="color:#A0A0B8;font-size:10px">'+(isToday?'📅 TODAY':rdate())+'</small></div>'+
'</div>'+

'<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">'+
'<button class="btn btn-sm btn-blue" onclick="printReport()">📄 PDF</button>'+
'<button class="btn btn-sm btn-green" onclick="copyReport()">📱 Share</button>'+
'<button class="btn btn-sm" style="background:#636366" onclick="printReport()">🖨️ Print</button>'+
'<button class="btn btn-sm" style="background:#FF9500" onclick="saveReport()">💾 Save</button>'+
'<button class="btn btn-sm btn-secondary" onclick="go(\'report\')">🔄 Refresh</button>'+
'</div>'+

'<div class="report-preview" id="rp" contenteditable="true" style="font-size:11px">'+
'<h3>CLERK OF WORKS — DAILY SITE REPORT</h3>'+
'<p style="text-align:center;color:#666;font-size:10px">Republic of Kenya — Ministry of Public Works Format</p>'+
'<hr>'+
'<p><strong>CONTRACT NO:</strong> '+(D.contractNo||'___________')+' <strong>PROJECT:</strong> '+(D.projectName||'________________________')+'</p>'+
'<p><strong>CONTRACTOR:</strong> '+(D.mainContractor||'________________________')+' <strong>DATE:</strong> '+rdate()+'</p>'+
'<p><strong>DAY NO:</strong> _______ <strong>WEEK NO:</strong> _______</p>'+
'<p><strong>REPORT NO:</strong> '+rn+' <strong>REPORTED BY:</strong> '+(D.cowName||'________________________')+'</p>'+
'<p><strong>WEATHER:</strong> ☐ Sunny ☐ Cloudy ☐ Rainy ☐ Stormy <strong>TEMP:</strong> Min: ___°C Max: ___°C</p>'+
'<hr>'+
'<h4>1.0 WORK IN PROGRESS</h4>'+
'<p>'+workText.replace(/\\n/g,'<br>')+'</p>'+
'<hr>'+
'<h4>2.0 LABOUR ON SITE</h4>'+
'<table><tr><th>Trade</th><th>Main Contractor</th><th>Sub-Contractor</th></tr>'+labourTable+'<tr><th>TOTAL</th><th colspan="2">'+totalWorkers+' workers</th></tr></table>'+
'<hr>'+
'<h4>3.0 PLANT & EQUIPMENT ON SITE</h4>'+
'<table><tr><th>Equipment</th><th>Qty</th><th>Status</th></tr>'+plantTable+'</table>'+
'<hr>'+
'<h4>4.0 MATERIALS DELIVERED</h4>'+
'<p>'+matText.replace(/\\n/g,'<br>')+'</p>'+
'<hr>'+
'<h4>5.0 INSPECTIONS, TESTS & CONCRETE CUBES</h4>'+
'<p>'+inspText.replace(/\\n/g,'<br>')+'</p>'+
'<hr>'+
'<h4>6.0 NON-CONFORMANCE REPORTS (NCRs)</h4>'+
'<p>'+ncrText.replace(/\\n/g,'<br>')+'</p>'+
'<hr>'+
'<h4>7.0 SITE INSTRUCTIONS ISSUED</h4>'+
'<p>'+siText.replace(/\\n/g,'<br>')+'</p>'+
'<hr>'+
'<h4>8.0 DELAYS / DISRUPTIONS</h4>'+
'<p><strong>Total Time Lost:</strong> '+totalHrs+' hours</p>'+
'<p>'+delayText.replace(/\\n/g,'<br>')+'</p>'+
'<hr>'+
'<h4>9.0 HEALTH & SAFETY OBSERVATIONS</h4>'+
'<p>☐ PPE worn ☐ Access/egress clear ☐ Scaffold safe ☐ First aid available ☐ Fire equipment in place</p>'+
'<p><strong>Incidents:</strong> None reported</p>'+
'<hr>'+
'<h4>10.0 GENERAL REMARKS</h4>'+
'<p>Work is progressing in accordance with the approved programme and specifications unless otherwise noted. Contractor is reminded to maintain quality standards and adhere to all safety requirements.</p>'+
'<hr>'+
'<div style="display:flex;justify-content:space-between;margin-top:10px">'+
'<div style="text-align:center">_________________<br><b>'+(D.cowName||'[COW Name]')+'</b><br><small>Clerk of Works</small><br>Date: '+rdate()+'</div>'+
'<div style="text-align:center">_________________<br><b>'+(D.contractorRepName||'[Contractor Rep]')+'</b><br><small>Contractor\'s Representative</small><br>Date: ................</div>'+
'</div>'+
'<p style="text-align:center;font-size:8px;margin-top:10px">Generated by Construction Manager | '+rn+' | '+reportDate+'</p>'+
'</div>'+
'<p style="color:#ff9f0a;margin-top:8px;text-align:center;font-size:11px">💡 <em>Click anywhere on the report to edit directly before printing.</em></p>';
};

function saveReport(){
if(!D.savedReports)D.savedReports=[];
D.savedReports.push({
id:uid(),date:reportDate,reportNo:'COW/'+((D.savedReports||[]).filter(function(e){return e.date===reportDate;}).length+1)+'/'+reportDate.substring(0,4),
projectName:D.projectName,contractorName:D.mainContractor,contractNo:D.contractNo,cowName:D.cowName,
diaryCount:(D.diaries||[]).filter(function(e){return e.date===reportDate;}).length,
inspectionCount:(D.inspections||[]).filter(function(e){return e.date===reportDate;}).length,
ncrCount:(D.ncrs||[]).filter(function(e){return e.date===reportDate;}).length,
siCount:(D.instructions||[]).filter(function(e){return e.date===reportDate;}).length,
labourTotal:0,timestamp:Date.now()
});
save();toast('💾 Report saved!');go('report');
}

function printReport(){
var c=document.getElementById('rp').innerHTML;
var w=window.open('','_blank','width=900,height=700');
w.document.write('<!DOCTYPE html><html><head><title>Daily Site Report</title><style>body{font-family:"Courier New",monospace;font-size:10px;line-height:1.4;padding:15px;color:#000}table{border-collapse:collapse;width:100%}th,td{border:1px solid #000;padding:3px}hr{border:1px solid #000}h3{text-align:center;font-size:13px}h4{font-size:11px;margin:6px 0}@media print{body{margin:0;padding:8px}}</style></head><body>'+c+'</body></html>');
w.document.close();
setTimeout(function(){w.print();},500);
}

function copyReport(){
var c=document.getElementById('rp').innerText;
navigator.clipboard.writeText(c).then(function(){toast('📋 Report copied!');});
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff}
.header{background:#1a1a1a;padding:12px;text-align:center;border-bottom:2px solid #ff9f0a;position:sticky;top:0;z-index:100}
.header h1{color:#ff9f0a;font-size:18px}
.nav{display:flex;overflow-x:auto;background:#1c1c1e;gap:4px;padding:8px;position:sticky;top:56px;z-index:99}
.nav button{flex:0 0 auto;background:#2c2c2e;color:#fff;border:none;padding:8px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;font-size:12px}
.nav button.active{background:#ff9f0a;color:#000;font-weight:bold}
.content{padding:15px;max-width:900px;margin:0 auto;padding-bottom:100px}
label{display:block;margin:10px 0 3px;color:#aaa;font-size:12px;font-weight:bold}
input,select,textarea{width:100%;padding:10px;background:#1c1c1e;border:1px solid #333;color:#fff;border-radius:8px;font-size:14px;margin-bottom:5px}
textarea{min-height:70px;resize:vertical}
.btn{background:#ff9f0a;color:#000;border:none;padding:10px 20px;border-radius:8px;font-weight:bold;cursor:pointer;margin:8px 4px 8px 0;font-size:13px}
.btn-blue{background:#0a84ff;color:#fff}
.btn-red{background:#ff3b30;color:#fff}
.btn-green{background:#30d158;color:#000}
.btn-sm{padding:6px 12px;font-size:11px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row>*{flex:1;min-width:120px}
table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
th,td{border:1px solid #333;padding:5px;text-align:left;vertical-align:top}
th{background:#1c1c1e;color:#ff9f0a;font-size:11px}
.card{background:#1c1c1e;border-radius:10px;padding:12px;margin:8px 0;border:1px solid #333}
.card h4{margin-bottom:8px;color:#ff9f0a}
.tag{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;margin:2px}
.tag-pass{background:#30d158;color:#000}
.tag-fail{background:#ff3b30;color:#fff}
.tag-open{background:#ff9f0a;color:#000}
.tag-closed{background:#30d158;color:#000}
.report-preview{background:#fff;color:#000;padding:20px;border-radius:8px;font-family:monospace;font-size:11px;line-height:1.5}
.report-preview h3{text-align:center;text-transform:uppercase;font-size:13px}
.report-preview h4{font-size:12px;margin-top:10px}
.report-preview hr{border:1px solid #000}
.report-preview table{border:1px solid #000;font-size:10px}
.report-preview td,.report-preview th{border:1px solid #000;color:#000;padding:3px}
.report-preview th{background:#ddd}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ff9f0a;color:#000;padding:10px 20px;border-radius:20px;font-weight:bold;display:none;z-index:1000}
@media print{body{background:#fff;color:#000}.header,.nav,.btn,.toast{display:none}.content{padding:0}.report-preview{border-radius:0}}
</style>
</head>
<body>
<div class="header"><h1>CONSTRUCTION MANAGER</h1><div style="margin-top:5px"><input type="date" id="globalDatePicker" onchange="setGlobalDate(this.value)" style="width:auto;display:inline-block;font-size:12px;text-align:center;background:#333;color:#ff9f0a;border:1px solid #ff9f0a;border-radius:6px;padding:4px 8px"> <small style="color:#aaa" id="globalDateLabel"></small></div></div>
<div class="nav" id="nav"></div>
<div class="content" id="content"></div>
<div class="toast" id="toast"></div>
<script>
// ============ CORE ============
var K="cm_v5";
var D=JSON.parse(localStorage.getItem(K))||getDefault();
function getDefault(){return {reportNo:"",date:new Date().toISOString().split("T")[0],projectName:"",wpItemNo:"",contractNo:"",siteLocation:"",county:"",mainContractor:"",weatherMorning:"",weatherAfternoon:"",groundCondition:"",tempNotes:"",diaries:[],inspections:[],ncrs:[],instructions:[],materials:[],materialLogs:[],labour:[],plant:[],meetings:[],delays:[],cowName:"",cowDateTime:"",contractorRepName:"",contractorRepDateTime:""};}
function save(){localStorage.setItem(K,JSON.stringify(D));}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none";},2000);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function today(){return new Date().toISOString().split("T")[0];}
var globalDate=today();
function setGlobalDate(d){globalDate=d;go(current);}
function fmtGlobalDate(){return new Date(globalDate).toLocaleDateString("en-KE",{weekday:"short",day:"numeric",month:"short",year:"numeric"});}
function addItem(arr,item){if(!D[arr])D[arr]=[];D[arr].push(item);save();}
function delItem(arr,id){D[arr]=D[arr].filter(function(i){return i.id!==id;});save();}

// ============ CATALOGS ============
var WORK_ITEMS=["Mobilization - Site Setup","Mobilization - Hoarding","Setting Out - Control Points","Setting Out - Grid Lines","Bulk Excavation","Trench Excavation","Backfill & Compaction","Hardcore Filling","Murram Blinding","Blinding - 50mm","DPM Installation","Foundation Reinforcement","Foundation Concreting","Column Starter Bars","Ground Beam Formwork","Ground Beam Reinforcement","Ground Beam Concreting","GFS - Hardcore","GFS - DPM","GFS - Blinding","GFS - BRC","GFS - Formwork","GFS - Concreting","Anti-Termite Treatment","Substructure Backfill","Column Reinf - GF","Column Shutters - GF","Column Concreting - GF","Beam Formwork - GF","Beam Reinf - GF","Beam Concreting - GF","Slab Formwork - GF","Slab Reinf - GF","Slab Concreting - GF","Blockwork - GF","Blockwork - 1F","Hoop Iron Installation","Ring Beam","Lintels","Steel Fabrication","Steel Erection","Roof Structure","Roof Underlay","Tile Roofing","Sheet Roofing","Flashings","Gutters","Waterproofing","Drainage","Plumbing","Electrical Cabling","Plastering","Rendering","Floor Screeding","Floor Tiling","Wall Tiling","Painting","Doors","Windows","Glazing","Ceiling","Paving","Landscaping","Septic Tank","Commissioning","Snagging","Cleaning","Handover"];
var OBSERVATIONS=["Work progressing well","Good quality workmanship","Materials as per specification","Weather favourable, good productivity","Safety measures in place","Work slightly behind schedule","Quality issues noted","Material shortage reported","Equipment breakdown","Labour shortage","Work stopped due to rain","Rain affected concreting","Work stopped - safety concern","Defective work rejected - NCR raised","Materials rejected","Inspection carried out","Site meeting held","Engineers instruction received","Concrete delivery received","Steel delivery received","Formwork being erected","Reinforcement being tied","Curing ongoing","Site cleaning in progress"];
var SITE_LOCATIONS=["Site Wide / General","Block A - Ground Floor","Block A - First Floor","Block B - Ground Floor","Block B - First Floor","Block C - Ground Floor","Main Entrance / Gate","Perimeter Wall","Parking Area","Driveway / Access Road","Excavation Area","Foundation / Substructure","Superstructure - Columns","Superstructure - Beams","Superstructure - Slabs","Staircase","Lift Shaft","Roof Level","External Works - Paving","External Works - Drainage","Site Office","Material Storage Area","Workshop / Yard","Guard House","Water Tank / Tower","Septic Tank Area"];
var NCR_CATEGORIES={"Excavation":["Too deep/shallow","Wrong trench width","Unsafe batter","Poor compaction"],"Substructure":["Blinding thin/uneven","DPM punctured","Wrong rebar","Insufficient cover","Honeycomb"],"Concrete Frame":["Honeycomb","Wrong grade","Insufficient vibration","Formwork not plumb","Cold joint"],"Blockwork":["Wrong block type","Poor bonding","Mortar mix wrong","Hoop iron missing"],"Finishes":["Plaster cracking","Uneven rendering","Wrong paint","Tiles not level"],"General":["Work not to drawing","Unsafe practice","Poor housekeeping"]};
var DELAY_CATEGORIES={"Weather":["Heavy rain","Flooding","High winds"],"Material Supply":["Late steel","Late cement","Material shortage"],"Labour":["Shortage","Strike","Key person absent"],"Equipment":["Crane breakdown","Pump failure","Generator failure"],"Design/Client":["Late design change","Delayed approval","Client variation"],"Contractual":["Delayed payment","Dispute"],"Other":["Utility relocation","Community unrest"]};
var MATERIAL_CATALOG={"Cement":["Cement OPC 42.5N","Cement PPC 32.5N"],"Steel":["Y8","Y10","Y12","Y16","Y20","Y25","BRC A142","Binding Wire"],"Blocks":["Solid Block 4in","Solid Block 6in","Hollow Block 6in"],"Aggregates":["River Sand","Plaster Sand","Ballast 14mm","Ballast 20mm","Hardcore","Murram"],"Timber":["Softwood 4x2","Plywood 18mm"],"Plumbing":["PVC Pipe 110mm","PVC Pipe 50mm","PEX Pipe 15mm"],"Electrical":["2.5mm Cable","4mm Cable","DB Board","Sockets"],"Finishes":["Ceramic Tiles","Porcelain Tiles","Emulsion Paint","Gloss Paint"]};
var INSPECTION_CHECKLISTS={"1. Mobilization & Setup":["Site handed over","Boundaries confirmed","Access roads OK","Water connected","Power connected","Security in place","First aid station","Site office complete"],"2. Setting Out":["Grid lines checked","Building corners set","Levels verified","Control points protected"],"3. Excavation":["Depth correct","Width correct","Bottom level","Safety slope/batter","Dewatering"],"4. Foundations":["Blinding level","Blinding thickness","DPM installed","DPM lapped","Rebar size","Rebar spacing","Cover blocks","Formwork secure & braced","Kicker height 100-150mm","Formwork plumb & aligned","Joints sealed","Formwork not struck before 24hrs","Concrete grade","Compaction","Curing"],"5. Columns":["Verticality/plumb","Rebar size","Stirrup spacing","Cover adequate","Formwork tight & sealed","Kicker cast","Box dimensions checked","Mould oil applied","Braced both directions","Pour max 1.5m per lift","Removal after 48hrs","Concrete grade","Vibration"],"6. Beams & Slabs":["Formwork level +/-5mm","Props vertical & braced","Props spacing 1.2m max","U-heads & base plates","Beam sides plumb","Mould oil applied","Striking: slabs 14d, beams 21d","Rebar spacing","Cover blocks","BRC chaired","Concrete grade","Compaction","Curing"],"7. Blockwork":["Block type correct","Mortar mix ratio","Alignment/plumb","Bond pattern","Hoop iron","Movement joints","Lintels installed"],"8. Plastering":["Surface prepared","Chicken mesh","Screeds placed","Mix ratio correct","Curing done","No cracks"],"9. Roofing":["Structure type","Underlay installed","Tiles/sheets fixed","Flashings installed","Gutters","Water test"],"10. Finishes":["Tiling level","Painting primer","Painting finish","Skirting installed","Ironmongery fitted","Glazing complete"]};
var MEETING_AGENDA=["Confirmation of Previous Minutes","Progress Review","Quality & Inspections","Materials & Deliveries","Plant & Equipment","Health & Safety","Variations & Claims","Programme & Delays","Subcontractors","Information Required","Any Other Business","Date of Next Meeting"];
var CONCRETE_MIXES={"C15/20 Blinding":{"ratio":"1:3:6","cement":"250kg (5 bags)","sand":"0.45m3","ballast":"0.9m3","water":"125L","use":"Blinding, lean concrete"},"C20/25 Light Duty":{"ratio":"1:2.5:5","cement":"300kg (6 bags)","sand":"0.44m3","ballast":"0.88m3","water":"150L","use":"Light duty floors"},"C25/30 General RC":{"ratio":"1:2:4","cement":"350kg (7 bags)","sand":"0.42m3","ballast":"0.84m3","water":"175L","use":"Slabs, beams, columns"},"C30/37 Heavy Duty":{"ratio":"1:2:3","cement":"400kg (8 bags)","sand":"0.40m3","ballast":"0.80m3","water":"200L","use":"Heavy duty, water retaining"},"C35/45 Precast":{"ratio":"1:1.5:3","cement":"450kg (9 bags)","sand":"0.38m3","ballast":"0.76m3","water":"200L","use":"Precast elements"},"C40/50 High Strength":{"ratio":"1:1.5:2.5","cement":"500kg (10 bags)","sand":"0.36m3","ballast":"0.72m3","water":"200L","use":"Bridge works"}};

// ============ NAVIGATION ============
var NAV=[{id:"dashboard",label:"Home"},{id:"diary",label:"Diary"},{id:"inspections",label:"Inspections"},{id:"ncr",label:"NCRs"},{id:"instructions",label:"S.I."},{id:"materials",label:"Materials"},{id:"concrete",label:"Concrete"},{id:"labour",label:"Labour"},{id:"plant",label:"Plant"},{id:"meetings",label:"Meetings"},{id:"delays",label:"Delays"},{id:"report",label:"REPORT"},{id:"project",label:"Settings"}];
var current="dashboard";
function nav(){var h="";for(var i=0;i<NAV.length;i++){h+='<button class="'+(NAV[i].id===current?"active":"")+'" onclick="go(\''+NAV[i].id+'\')">'+NAV[i].label+'</button>';}document.getElementById("nav").innerHTML=h;var gdp=document.getElementById("globalDatePicker");if(gdp){gdp.value=globalDate;gdp.max=today();}var gdl=document.getElementById("globalDateLabel");if(gdl)gdl.textContent=fmtGlobalDate();}
function go(id){current=id;nav();document.getElementById("content").innerHTML=RENDER[id]?RENDER[id]():"";if(id!=="report")bindInputs();window.scrollTo(0,0);}
function bindInputs(){document.querySelectorAll("input,select,textarea").forEach(function(el){el.addEventListener("input",function(){if(this.id&&this.id.startsWith("_"))return;if(this.id)D[this.id]=this.value;save();});if(D[el.id]!==undefined&&el.type!=="file")el.value=D[el.id];});}
// ============ RENDERERS ============
var SI_CATEGORIES=["Instruct contractor to rectify defective work","Accelerate works to recover delay","Submit method statement for approval","Provide material samples for approval","Increase labour force at ___","Provide additional plant/equipment","Comply with safety requirements","Submit updated programme","Submit as-built drawings","Submit test results for ___","Stop work at ___ until further notice","Provide access for inspection","Protect completed works","Clean site / remove debris","Submit variation quotation","Other"];
var RENDER={};

// DASHBOARD
RENDER["dashboard"]=function(){
var ds=(D.diaries||[]).filter(function(e){return e.date===globalDate;});
var insp=(D.inspections||[]).filter(function(e){return e.date===globalDate;});
var nc=(D.ncrs||[]).filter(function(e){return e.status==="open";});
var lab=(D.labour||[]).filter(function(e){return e.date===globalDate;});
var pa=(D.plant||[]).filter(function(e){return e.status==="Active";});
var del=(D.delays||[]).filter(function(e){return e.date===globalDate;});
var tl=0;for(var i=0;i<lab.length;i++){tl+=parseInt(lab[i].mainCount||0)+parseInt(lab[i].subCount||0);}
var ip=0,it=0;for(var i=0;i<insp.length;i++){for(var j=0;j<insp[i].items.length;j++){it++;if(insp[i].items[j].pass)ip++;}}
var ds2=new Date(globalDate).toLocaleDateString("en-KE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
return '<div style="text-align:center;padding:10px 0"><h2 style="color:#ff9f0a;font-size:22px;margin:0">CONSTRUCTION MANAGER</h2><p style="color:#aaa;font-size:13px">'+ds2+'</p></div>'+
'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0">'+
'<div class="card" style="text-align:center;cursor:pointer" onclick="go(\'diary\')"><div style="font-size:28px">&#x1F4D4;</div><div style="font-size:22px;font-weight:bold;color:#ff9f0a">'+ds.length+'</div><small style="color:#aaa">Diary</small></div>'+
'<div class="card" style="text-align:center;cursor:pointer" onclick="go(\'inspections\')"><div style="font-size:28px">&#x2705;</div><div style="font-size:22px;font-weight:bold;color:'+(it>0&&ip===it?"#30d158":"#ff9f0a")+'">'+(it>0?ip+"/"+it:"0")+'</div><small style="color:#aaa">Inspections</small></div>'+
'<div class="card" style="text-align:center;cursor:pointer" onclick="go(\'labour\')"><div style="font-size:28px">&#x1F477;</div><div style="font-size:22px;font-weight:bold;color:#0a84ff">'+tl+'</div><small style="color:#aaa">Labour</small></div>'+
'<div class="card" style="text-align:center;cursor:pointer" onclick="go(\'ncr\')"><div style="font-size:28px">&#x1F6A8;</div><div style="font-size:22px;font-weight:bold;color:'+(nc.length>0?"#ff3b30":"#30d158")+'">'+nc.length+'</div><small style="color:#aaa">Open NCRs</small></div>'+
'<div class="card" style="text-align:center;cursor:pointer" onclick="go(\'delays\')"><div style="font-size:28px">&#x23F0;</div><div style="font-size:22px;font-weight:bold;color:'+(del.length>0?"#ff9f0a":"#30d158")+'">'+del.length+'</div><small style="color:#aaa">Delays</small></div>'+
'<div class="card" style="text-align:center;cursor:pointer" onclick="go(\'plant\')"><div style="font-size:28px">&#x1F69C;</div><div style="font-size:22px;font-weight:bold;color:#0a84ff">'+pa.length+'</div><small style="color:#aaa">Plant</small></div>'+
'</div>'+
'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0">'+
'<button class="btn btn-blue" onclick="go(\'diary\');setTimeout(showDiaryForm,100)">+ Quick Diary</button>'+
'<button class="btn btn-green" onclick="go(\'inspections\');setTimeout(showInspectionForm,100)">+ Inspection</button>'+
'<button class="btn" style="background:#ff3b30;color:#fff" onclick="go(\'ncr\');setTimeout(showNCRForm,100)">+ Raise NCR</button>'+
'<button class="btn" style="background:#0a84ff;color:#fff" onclick="go(\'labour\');setTimeout(showLabourForm,100)">+ Log Labour</button>'+
'</div>'+
'<br><button class="btn" style="width:100%;background:#ff9f0a;color:#000;font-size:16px;padding:14px" onclick="go(\'report\')">VIEW REPORT</button><br><br>';
};

// DIARY
RENDER["diary"]=function(){
var list="";var entries=(D.diaries||[]).filter(function(e){return e.date===globalDate;});
if(entries.length===0){list='<p style="color:#666">No diary entries for this date.</p>';}
else{for(var i=0;i<entries.length;i++){var e=entries[i];list+='<div class="card"><div style="display:flex;justify-content:space-between"><h4>'+e.activity+'</h4><button class="btn btn-red btn-sm" onclick="delItem(\'diaries\',\''+e.id+'\');go(\'diary\')">X</button></div><p style="font-size:12px;color:#aaa">'+e.location+' | Labour: '+e.labour+' | '+e.time+'</p><p style="font-size:13px">'+e.obs+'</p></div>';}}
return '<h2>Site Diary</h2><p style="color:#aaa;font-size:12px">Date: '+globalDate+'</p>'+list+'<button class="btn btn-blue" onclick="showDiaryForm()">+ New Diary Entry</button>';
};
function showDiaryForm(){
var wo="";for(var i=0;i<WORK_ITEMS.length;i++){wo+='<option>'+WORK_ITEMS[i]+'</option>';}
var locs="";for(var i=0;i<SITE_LOCATIONS.length;i++){locs+='<option>'+SITE_LOCATIONS[i]+'</option>';}
var ob="";for(var i=0;i<OBSERVATIONS.length;i++){ob+='<option>'+OBSERVATIONS[i]+'</option>';}
var h='<h3>New Diary Entry</h3><label>Date:</label><input type="date" id="_entryDate" value="'+globalDate+'" max="'+today()+'"><label>Activity:</label><select id="_da">'+wo+'</select><label>Location:</label><select id="_dl">'+locs+'</select><div class="row"><div><label>Labour Count:</label><input id="_dlb" type="number" value="0"></div><div><label>Equipment:</label><input id="_de" placeholder="e.g. Mixer"></div></div><label>Observation:</label><select id="_do">'+ob+'</select><label>Remarks:</label><textarea id="_dr"></textarea><button class="btn" onclick="saveDiary()">Save Entry</button><button class="btn btn-secondary" onclick="go(\'diary\')">Cancel</button>';
document.getElementById("content").innerHTML=h;
}
function saveDiary(){
addItem("diaries",{id:uid(),date:document.getElementById("_entryDate").value,time:new Date().toLocaleTimeString(),activity:document.getElementById("_da").value,location:document.getElementById("_dl").value,labour:document.getElementById("_dlb").value,equipment:document.getElementById("_de").value,obs:document.getElementById("_do").value,remarks:document.getElementById("_dr").value});
toast("Diary saved!");go("diary");
}

// INSPECTIONS
RENDER["inspections"]=function(){
var list="";var insp=(D.inspections||[]).filter(function(e){return e.date===globalDate;});
if(insp.length===0){list='<p style="color:#666">No inspections for this date.</p>';}
else{for(var i=0;i<insp.length;i++){var e=insp[i];var p=0,t=e.items.length;for(var j=0;j<t;j++){if(e.items[j].pass)p++;}list+='<div class="card"><div style="display:flex;justify-content:space-between"><h4>'+e.phase+'</h4><button class="btn btn-red btn-sm" onclick="delItem(\'inspections\',\''+e.id+'\');go(\'inspections\')">X</button></div><p><span class="tag '+(p===t?"tag-pass":"tag-fail")+'">'+p+'/'+t+' Passed</span> '+e.location+'</p></div>';}}
return '<h2>Inspections</h2><p style="color:#aaa;font-size:12px">Date: '+globalDate+'</p>'+list+'<button class="btn btn-blue" onclick="showInspectionForm()">+ New Inspection</button>';
};
function showInspectionForm(){
var phases="";var keys=Object.keys(INSPECTION_CHECKLISTS);for(var i=0;i<keys.length;i++){phases+='<option value="'+keys[i]+'">'+keys[i]+'</option>';}
var h='<h3>New Inspection</h3><label>Date:</label><input type="date" id="_entryDate" value="'+globalDate+'" max="'+today()+'"><label>Phase:</label><select id="_ip" onchange="loadChecklist()">'+phases+'</select><label>Location:</label><input id="_il" placeholder="e.g. Block A - GF"><div id="_checklist"></div><label>Notes:</label><textarea id="_in"></textarea><button class="btn" onclick="saveInspection()">Save Inspection</button><button class="btn btn-secondary" onclick="go(\'inspections\')">Cancel</button>';
document.getElementById("content").innerHTML=h;loadChecklist();
}
function loadChecklist(){var phase=document.getElementById("_ip").value;var items=INSPECTION_CHECKLISTS[phase]||[];var h="";for(var i=0;i<items.length;i++){h+='<div style="display:flex;align-items:center;gap:8px;margin:5px 0"><input type="checkbox" id="_ck_'+i+'" checked style="width:auto"><label style="margin:0">'+items[i]+'</label></div>';}document.getElementById("_checklist").innerHTML=h;}
function saveInspection(){var phase=document.getElementById("_ip").value;var items=INSPECTION_CHECKLISTS[phase]||[];var checklist=[];for(var i=0;i<items.length;i++){var el=document.getElementById("_ck_"+i);checklist.push({label:items[i],pass:el?el.checked:true});}addItem("inspections",{id:uid(),date:document.getElementById("_entryDate").value,phase:phase,location:document.getElementById("_il").value,items:checklist,notes:document.getElementById("_in").value});toast("Inspection saved!");go("inspections");}

// NCR
RENDER["ncr"]=function(){
var list="";var ncrs=D.ncrs||[];
if(ncrs.length===0){list='<p style="color:#666">No NCRs recorded.</p>';}
else{for(var i=0;i<ncrs.length;i++){var e=ncrs[i];list+='<div class="card"><div style="display:flex;justify-content:space-between"><h4>'+e.title+'</h4><button class="btn btn-red btn-sm" onclick="delItem(\'ncrs\',\''+e.id+'\');go(\'ncr\')">X</button></div><p><span class="tag tag-'+(e.status==="open"?"open":"closed")+'">'+e.status.toUpperCase()+'</span> | '+e.severity+' | '+e.location+'</p><p style="font-size:12px">'+e.desc+'</p></div>';}}
return '<h2>Non-Conformance Reports</h2>'+list+'<button class="btn btn-blue" onclick="showNCRForm()">+ New NCR</button>';
};
function showNCRForm(){
var cats="";var ckeys=Object.keys(NCR_CATEGORIES);for(var i=0;i<ckeys.length;i++){cats+='<option>'+ckeys[i]+'</option>';}
var h='<h3>New NCR</h3><label>Date:</label><input type="date" id="_entryDate" value="'+globalDate+'" max="'+today()+'"><label>Category:</label><select id="_ncat" onchange="loadNCRItems()">'+cats+'</select><label>Specific Issue:</label><select id="_nitem"></select><label>Title:</label><input id="_ntitle" placeholder="Brief title"><label>Severity:</label><select id="_nsev"><option>Major</option><option>Minor</option><option>Critical</option></select><label>Location:</label><input id="_nloc"><label>Description:</label><textarea id="_ndesc"></textarea><label>Action Required:</label><textarea id="_nact"></textarea><button class="btn" onclick="saveNCR()">Save NCR</button><button class="btn btn-secondary" onclick="go(\'ncr\')">Cancel</button>';
document.getElementById("content").innerHTML=h;loadNCRItems();
}
function loadNCRItems(){var cat=document.getElementById("_ncat").value;var items=NCR_CATEGORIES[cat]||[];var h="";for(var i=0;i<items.length;i++){h+='<option>'+items[i]+'</option>';}document.getElementById("_nitem").innerHTML=h;}

var totalWorkers=0;for(var i=0;i<lab.length;i++){totalWorkers+=parseInt(lab[i].mainCount||0)+parseInt(lab[i].subCount||0);}

// Work progress

// Meetings
var meetText="";for(var i=0;i<meets.length;i++){meetText+=meets[i].meetingNo+" at "+meets[i].venue+": "+meets[i].agendaItems+"\n";}

return '<div style="background:#2C2C2E;border-radius:8px;padding:8px;margin-bottom:10px"><div style="text-align:center"><label style="color:#F78166;font-size:12px">Select Report Date:</label><br><input type="date" id="_reportDatePicker" value="'+reportDate+'" max="'+today()+'" style="width:auto;display:inline-block;font-size:16px;text-align:center;background:#333;color:#fff;border:1px solid #ff9f0a;border-radius:8px;padding:8px;margin:5px 0" onchange="reportDate=this.value;go(\'report\')"><br><small style="color:#A0A0B8;font-size:10px">'+(isToday?"TODAY":rdate())+'</small></div></div>'+

'<p><strong>WEATHER:</strong> '+(D.weatherMorning||"___")+' / '+(D.weatherAfternoon||"___")+' <strong>TEMP:</strong> '+(D.tempNotes||"___")+'</p><hr>'+

'<h4>8.0 DELAYS / DISRUPTIONS</h4><p><strong>Time Lost:</strong> '+totalHrs+' hrs</p><p>'+delayText.replace(/\n/g,"<br>")+'</p><hr>'+

'<div style="display:flex;justify-content:space-between;margin-top:10px">'+
'<div style="text-align:center">_________________<br><b>'+(D.cowName||"[COW Name]")+'</b><br><small>Clerk of Works</small><br>Date: '+rdate()+'</div>'+
'<div style="text-align:center">_________________<br><b>'+(D.contractorRepName||"[Contractor Rep]")+'</b><br><small>Contractors Representative</small><br>Date: ................</div>'+
'</div>'+
'<p style="text-align:center;font-size:8px;margin-top:10px">Generated by Construction Manager | '+rn+' | '+reportDate+'</p>'+
'</div>'+
'<p style="color:#ff9f0a;margin-top:8px;text-align:center;font-size:11px">Click anywhere on the report to edit directly before printing.</p>';
};

function saveReport(){if(!D.savedReports)D.savedReports=[];D.savedReports.push({id:uid(),date:reportDate,timestamp:Date.now()});save();toast("Report saved!");go("report");}

function copyReport(){var c=document.getElementById("rp").innerText;navigator.clipboard.writeText(c).then(function(){toast("Report copied!");});}

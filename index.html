<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff}
.header{background:#1a1a1a;padding:12px;text-align:center;border-bottom:2px solid #ff9f0a;position:sticky;top:0;z-index:100}
.header h1{color:#ff9f0a;font-size:18px}
.nav{display:flex;overflow-x:auto;background:#1c1c1e;gap:4px;padding:8px;position:sticky;top:56px;z-index:99}
.nav button{flex:0 0 auto;background:#2c2c2e;color:#fff;border:none;padding:8px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;font-size:12px}
.nav button.active{background:#ff9f0a;color:#000;font-weight:bold}
.content{padding:15px;max-width:900px;margin:0 auto;padding-bottom:100px}
label{display:block;margin:10px 0 3px;color:#aaa;font-size:12px;font-weight:bold}
input,select,textarea{width:100%;padding:10px;background:#1c1c1e;border:1px solid #333;color:#fff;border-radius:8px;font-size:14px;margin-bottom:5px}
textarea{min-height:70px;resize:vertical}
.btn{background:#ff9f0a;color:#000;border:none;padding:10px 20px;border-radius:8px;font-weight:bold;cursor:pointer;margin:8px 4px 8px 0;font-size:13px}
.btn-blue{background:#0a84ff;color:#fff}
.btn-red{background:#ff3b30;color:#fff}
.btn-green{background:#30d158;color:#000}
.btn-sm{padding:6px 12px;font-size:11px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row>*{flex:1;min-width:120px}
table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
th,td{border:1px solid #333;padding:5px;text-align:left;vertical-align:top}
th{background:#1c1c1e;color:#ff9f0a;font-size:11px}
.card{background:#1c1c1e;border-radius:10px;padding:12px;margin:8px 0;border:1px solid #333}
.card h4{margin-bottom:8px;color:#ff9f0a}
.tag{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;margin:2px}
.tag-pass{background:#30d158;color:#000}
.tag-fail{background:#ff3b30;color:#fff}
.tag-open{background:#ff9f0a;color:#000}
.tag-closed{background:#30d158;color:#000}
.report-preview{background:#fff;color:#000;padding:20px;border-radius:8px;font-family:monospace;font-size:11px;line-height:1.5}
.report-preview h3{text-align:center;text-transform:uppercase;font-size:13px}
.report-preview h4{font-size:12px;margin-top:10px}
.report-preview hr{border:1px solid #000}
.report-preview table{border:1px solid #000;font-size:10px}
.report-preview td,.report-preview th{border:1px solid #000;color:#000;padding:3px}
.report-preview th{background:#ddd}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ff9f0a;color:#000;padding:10px 20px;border-radius:20px;font-weight:bold;display:none;z-index:1000}
@media print{body{background:#fff;color:#000}.header,.nav,.btn,.toast{display:none}.content{padding:0}.report-preview{border-radius:0}}
</style>
</head>

<div class="nav" id="nav"></div>
<div class="content" id="content"></div>

save();}
rebuildStock();

function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}

var globalDate=today();

RENDER["concrete"]=function(){

h+='<div id="cRef" style="display:none"><h3>Concrete Mixes (per m3)</h3><div id="cRefC"></div><h3 style="margin-top:15px">Mortar Mixes (per m3)</h3><div id="cRefM"></div><div class="card" style="font-size:12px"><h4>Batching Guide</h4><p><b>1 bag cement</b> = 50kg = 0.035 m3</p><p><b>1 wheelbarrow</b> = ~0.065 m3 (65 litres)</p><p><b>1 bucket (20L)</b> = 0.02 m3</p></div></div>';
h+='<div id="cTest" style="display:none"><div class="card" style="font-size:12px"><h4>Slump Test (Workability)</h4><p><b>Equipment:</b> Slump cone 300mm, tamping rod 16mm, base plate</p><p><b>Target:</b> 50-100mm for normal RC | 25-50mm pavements | 100-150mm pumped</p><p><b>Procedure:</b> Fill cone in 3 equal layers, rod each 25 times, strike off top, lift cone vertically in 5 seconds, measure drop</p><p><b>Fail if:</b> Collapses (too wet), shears off (no cohesion), zero slump (too dry)</p></div><div class="card" style="font-size:12px"><h4>Cube Test (Compressive Strength)</h4><p><b>Mould:</b> 150mm x 150mm x 150mm steel</p><p><b>Sample:</b> Cast minimum 3 cubes per batch</p><p><b>Curing:</b> Submerge in clean water at 20-25C until testing</p><p><b>7-day:</b> 60-70% of design strength</p><p><b>28-day:</b> Full strength (C25 = 25 N/mm2 minimum)</p></div><div class="card" style="font-size:12px"><h4>Site Quick Tests</h4><p><b>Ball Test:</b> Squeeze concrete - should hold shape, not crumble or bleed</p><p><b>Trowel Test:</b> Pat surface - should float smooth, paste cover aggregate</p><p><b>Water Test:</b> Compact - no free water should rise to surface</p><p><b>Segregation:</b> Drop small amount - coarse aggregate stays mixed</p></div><div class="card" style="font-size:12px"><h4>Curing Requirements</h4><p><b>Normal:</b> Keep continuously wet for 7 days minimum</p><p><b>Ponding:</b> Best for slabs - create water pond</p><p><b>Hessian:</b> Cover with wet hessian, keep damp</p><p><b>Spraying:</b> Mist 3-4 times daily</p><p><b>Formwork:</b> Columns 2 days, beams/slabs 7-14 days</p><p><b>Hot (>30C):</b> Start within 30min | <b>Cold (<5C):</b> Protect 72hrs</p></div></div>';
h+='<div id="cAdmix" style="display:none"><div class="card" style="font-size:12px"><h4>Concrete Admixtures Guide</h4><p><b>Waterproofer (Liquid):</b> 200ml per 50kg bag</p><p><b>Waterproofer (Powder):</b> 1kg per 50kg bag</p><p><b>Accelerator:</b> 1-2L per 50kg bag (cold weather)</p><p><b>Retarder:</b> 0.5-1L per 50kg bag (hot weather)</p><p><b>Plasticiser:</b> 150ml per 50kg bag - reduces water 10-15%</p><p><b>Superplasticiser:</b> 0.5-1.5L per 50kg - flowing concrete</p><p><b>Bonding Agent (SBR):</b> 1:1 with water as primer, 1:4 in mix</p><p><b>Curing Compound:</b> Apply 1L per 4-5m2 after finishing</p><p><b>Air Entrainer:</b> 50-100ml per 50kg (freeze-thaw resistance)</p><p><b>Shrinkage Reducer:</b> 2-3L per m3 - reduces cracking</p><p><b>Corrosion Inhibitor:</b> 3-5L per m3 (marine/saline areas)</p><p><b>Colouring Pigment:</b> 2-5kg per 50kg bag</p><p><b>Fibres (Polypropylene):</b> 900g per m3 - reduces plastic cracking</p><p><b>Fibres (Steel):</b> 20-40kg per m3 (industrial floors)</p></div></div>';

var CONC_MIXES={"C15/20 Blinding":{r:"1:3:6",c:250,s:0.45,b:0.9,w:125,u:"Blinding, lean concrete"},"C20/25 Light Duty":{r:"1:2.5:5",c:300,s:0.44,b:0.88,w:150,u:"Light duty floors"},"C25/30 General RC":{r:"1:2:4",c:350,s:0.42,b:0.84,w:175,u:"Slabs, beams, columns"},"C30/37 Heavy Duty":{r:"1:2:3",c:400,s:0.40,b:0.80,w:200,u:"Heavy duty, water retaining"},"C35/45 Precast":{r:"1:1.5:3",c:450,s:0.38,b:0.76,w:200,u:"Precast elements"},"C40/50 High Strength":{r:"1:1.5:2.5",c:500,s:0.36,b:0.72,w:200,u:"Bridge works"}};

var CONC_EXPLAIN={"C15/20 Blinding":"1 bag : 3 wheelbarrows sand : 6 ballast : 25L water","C20/25 Light Duty":"1 bag : 2.5 wheelbarrows sand : 5 ballast : 25L water","C25/30 General RC":"1 bag : 2 wheelbarrows sand : 4 ballast : 25L water","C30/37 Heavy Duty":"1 bag : 2 wheelbarrows sand : 3 ballast : 25L water","C35/45 Precast":"1 bag : 1.5 wheelbarrows sand : 3 ballast : 22L water","C40/50 High Strength":"1 bag : 1.5 wheelbarrows sand : 2.5 ballast : 20L water","Blockwork 1:4":"1 bag : 4 wheelbarrows sand : 25L water","Blockwork 1:3":"1 bag : 3 wheelbarrows sand : 22L water","Plaster 1:4 (Internal)":"1 bag : 4 wheelbarrows sand : 25L water","Plaster 1:3 (External)":"1 bag : 3 wheelbarrows sand : 22L water","Screed 1:3":"1 bag : 3 wheelbarrows sand : 22L water","Tiling 1:2":"1 bag : 2 wheelbarrows sand : 22L water","Pointing 1:1":"1 bag : 1 wheelbarrow sand : 22L water"};

else if(s=="column")h='<div class="row"><div>Width (mm):<br><input id="ccw" type="number" value="230" onchange="cCalc()"></div><div>Depth (mm):<br><input id="cch" type="number" value="230" onchange="cCalc()"></div></div>Height (m):<br><input id="ccl" type="number" value="3" step="0.1" onchange="cCalc()">';

else if(s=="cylinder")h='Diameter (mm):<br><input id="ccw" type="number" value="300" onchange="cCalc()">Height (m):<br><input id="ccl" type="number" value="3" step="0.1" onchange="cCalc()">';

function cCalc(){
var t=document.getElementById("cmt").value;
var s=document.getElementById("cct").value;
var l=parseFloat((document.getElementById("ccl")||{}).value)||0;
var w=parseFloat((document.getElementById("ccw")||{}).value)||0;
var hh=parseFloat((document.getElementById("cch")||{}).value)||0;
var vol=0;
if(t==="concrete"){
if(s=="slab")vol=l*w*(hh/1000);
else if(s=="beam")vol=l*(w/1000)*(hh/1000);
else if(s=="column")vol=(w/1000)*(hh/1000)*l;
else if(s=="footing")vol=l*w*(hh/1000);
else if(s=="wall")vol=l*(w/1000)*hh;
else if(s=="cylinder")vol=Math.PI*Math.pow(w/2000,2)*l;
}else{
if(s=="wall_area"||s=="floor_area")vol=l*(hh/1000);
else vol=l;
}
var waste=parseFloat((document.getElementById("ccw")||{}).value)||1;vol*=waste;
var gr=document.getElementById("ccg").value;
var data=t==="concrete"?CONC_MIXES:CONC_MORTAR;
var mx=data[gr]||{};
var cem=mx.c||0;
var cb=Math.ceil((vol*cem)/50);
var sd=(vol*(mx.s||0)).toFixed(2);
var bl=mx.b?(vol*mx.b).toFixed(2):null;
var wt=Math.round(vol*(mx.w||0));
var r=document.getElementById("ccr");
var txt='<b style="color:#ff9f0a">RESULTS</b><br>Volume: <b>'+vol.toFixed(3)+' m3</b><br><br><b>Cement:</b> '+cb+' bags ('+(cb*50)+' kg)<br><b>Sand:</b> '+sd+' m3';
if(bl)txt+='<br><b>Ballast:</b> '+bl+' m3';
txt+='<br><b>Water:</b> ~'+wt+' litres<br><small style="color:#ff9f0a">'+mx.r+' | '+(CONC_EXPLAIN[gr]||"")+'</small>';
r.innerHTML=txt;
}

function buildRef(){
var rc="",rm="";
var ck=Object.keys(CONC_MIXES);
for(var i=0;i<ck.length;i++){var g=ck[i];var m=CONC_MIXES[g];
rc+='<div class="card"><b>'+g+'</b><br>Ratio: '+m.r+' | Cement: '+m.c+' kg | Sand: '+m.s+' m3 | Ballast: '+m.b+' m3<br>Water: '+m.w+'L | '+m.u+'<br><small style="color:#ff9f0a">'+(CONC_EXPLAIN[g]||"")+'</small></div>';}
var mk=Object.keys(CONC_MORTAR);
for(var i=0;i<mk.length;i++){var g=mk[i];var m=CONC_MORTAR[g];

RENDER["report"]=function(){
reportDate=globalDate;
var dt=(D.diaries||[]).filter(function(e){return e.date===reportDate;});
var insp=(D.inspections||[]).filter(function(e){return e.date===reportDate;});
var ncrs=(D.ncrs||[]).filter(function(e){return e.date===reportDate;});
var sis=(D.instructions||[]).filter(function(e){return e.date===reportDate;});
var delays=(D.delays||[]).filter(function(e){return e.date===reportDate;});
var logs=(D.materialLogs||[]).filter(function(e){return e.date===reportDate;});
var mats=logs.filter(function(e){return e.type==="delivery";});
var used=logs.filter(function(e){return e.type==="usage";});
var lab=(D.labour||[]).filter(function(e){return e.date===reportDate;});
var plant=D.plant||[];
var meets=(D.meetings||[]).filter(function(e){return e.date===reportDate;});
var isToday=reportDate===today();
var rn="COW/"+(D.savedReports?D.savedReports.length+1:1)+"/"+reportDate.substring(0,4);
var totalWorkers=0;for(var i=0;i<lab.length;i++){totalWorkers+=parseInt(lab[i].mainCount||0)+parseInt(lab[i].subCount||0);}

// Work progress
var workText="";for(var i=0;i<dt.length;i++){workText+=dt[i].activity+" - "+dt[i].location+"\n"+dt[i].obs+(dt[i].remarks?" ("+dt[i].remarks+")":"")+"\n\n";}if(!workText)workText="No diary entries.\n";

// Labour table
var labourTable="";var trades=["Site Agent","Masons","Carpenters","Steel Fixers","Plumbers","Painters","General","Other"];for(var t=0;t<trades.length;t++){var m=0,s=0;for(var l=0;l<lab.length;l++){if(lab[l].trade===trades[t]){m+=parseInt(lab[l].mainCount||0);s+=parseInt(lab[l].subCount||0);}}if(m>0||s>0)labourTable+="<tr><td>"+trades[t]+"</td><td>"+m+"</td><td>"+s+"</td></tr>";}if(!labourTable)labourTable='<tr><td colspan="3">No labour recorded</td></tr>';

// Plant
var plantTable="";for(var i=0;i<plant.length;i++){plantTable+="<tr><td>"+plant[i].name+"</td><td>"+(plant[i].qty||"1")+"</td><td>"+plant[i].status+"</td></tr>";}if(!plantTable)plantTable='<tr><td colspan="3">No plant recorded</td></tr>';

// Materials
var matText="";for(var i=0;i<mats.length;i++){matText+=(i+1)+". "+mats[i].name+" - "+mats[i].qty+" "+mats[i].unit+" from "+mats[i].source+"\n";}if(!matText)matText="No deliveries.\n";
var usedText="";for(var i=0;i<used.length;i++){usedText+=(i+1)+". "+used[i].name+" - "+used[i].qty+" "+used[i].unit+" at "+used[i].location+"\n";}

// Inspections
var inspText="";for(var i=0;i<insp.length;i++){var p=0,f=0;for(var j=0;j<insp[i].items.length;j++){if(insp[i].items[j].pass)p++;else f++;}inspText+=insp[i].phase+" at "+insp[i].location+": "+p+"/"+(p+f)+" passed\n";}if(!inspText)inspText="No inspections.\n";

// NCRs
var ncrText="";for(var i=0;i<ncrs.length;i++){ncrText+=(i+1)+". "+ncrs[i].title+" ("+ncrs[i].severity+") - "+ncrs[i].desc.substring(0,80)+"... ["+ncrs[i].status+"]\n";}if(!ncrText)ncrText="No NCRs.\n";

// SIs
var siText="";for(var i=0;i<sis.length;i++){siText+=(i+1)+". To: "+sis[i].issuedTo+" - "+sis[i].desc.substring(0,60)+"... (Deadline: "+sis[i].deadline+")\n";}if(!siText)siText="No SIs.\n";

// Delays
var delayText="";var totalHrs=0;for(var i=0;i<delays.length;i++){delayText+=delays[i].cause+" - "+delays[i].duration+" hrs ("+delays[i].impact+")\n";totalHrs+=parseInt(delays[i].duration||0);}if(!delayText)delayText="No delays.\n";

// Meetings
var meetText="";for(var i=0;i<meets.length;i++){meetText+=meets[i].meetingNo+" at "+meets[i].venue+": "+meets[i].agendaItems+"\n";}

return '<div style="background:#2C2C2E;border-radius:8px;padding:8px;margin-bottom:10px"><div style="text-align:center"><label style="color:#F78166;font-size:12px">Select Report Date:</label><br><input type="date" id="_reportDatePicker" value="'+reportDate+'" max="'+today()+'" style="width:auto;display:inline-block;font-size:16px;text-align:center;background:#333;color:#fff;border:1px solid #ff9f0a;border-radius:8px;padding:8px;margin:5px 0" onchange="reportDate=this.value;go(\'report\')"><br><small style="color:#A0A0B8;font-size:10px">'+(isToday?"TODAY":rdate())+'</small></div></div>'+
'<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">'+
'<button class="btn btn-sm btn-blue" onclick="printReport()">PDF</button>'+
'<button class="btn btn-sm btn-green" onclick="copyReport()">Copy</button>'+
'<button class="btn btn-sm" style="background:#FF9500" onclick="saveReport()">Save</button>'+
'</div>'+
'<div class="report-preview" id="rp" contenteditable="true" style="font-size:11px">'+
'<h3>CLERK OF WORKS - DAILY SITE REPORT</h3>'+
'<p style="text-align:center;color:#666;font-size:10px">Republic of Kenya - Ministry of Public Works Format</p><hr>'+
'<p><strong>CONTRACT NO:</strong> '+(D.contractNo||"___________")+' <strong>PROJECT:</strong> '+(D.projectName||"________________________")+'</p>'+
'<p><strong>CONTRACTOR:</strong> '+(D.mainContractor||"________________________")+' <strong>DATE:</strong> '+rdate()+'</p>'+
'<p><strong>REPORT NO:</strong> '+rn+' <strong>REPORTED BY:</strong> '+(D.cowName||"________________________")+'</p>'+
'<p><strong>WEATHER:</strong> '+(D.weatherMorning||"___")+' / '+(D.weatherAfternoon||"___")+' <strong>TEMP:</strong> '+(D.tempNotes||"___")+'</p><hr>'+
'<h4>1.0 WORK IN PROGRESS</h4><p>'+workText.replace(/\n/g,"<br>")+'</p><hr>'+
'<h4>2.0 LABOUR ON SITE</h4><table><tr><th>Trade</th><th>Main</th><th>Sub</th></tr>'+labourTable+'<tr><th>TOTAL</th><th colspan="2">'+totalWorkers+' workers</th></tr></table><hr>'+
'<h4>3.0 PLANT & EQUIPMENT</h4><table><tr><th>Equipment</th><th>Qty</th><th>Status</th></tr>'+plantTable+'</table><hr>'+
'<h4>4.0 MATERIALS DELIVERED</h4><p>'+matText.replace(/\n/g,"<br>")+'</p><h4>4.1 MATERIALS USED</h4><p>'+(usedText||"None").replace(/\n/g,"<br>")+'</p><hr>'+
'<h4>5.0 INSPECTIONS</h4><p>'+inspText.replace(/\n/g,"<br>")+'</p><hr>'+
'<h4>6.0 NON-CONFORMANCE REPORTS</h4><p>'+ncrText.replace(/\n/g,"<br>")+'</p><hr>'+
'<h4>7.0 SITE INSTRUCTIONS</h4><p>'+siText.replace(/\n/g,"<br>")+'</p><hr>'+
'<h4>8.0 DELAYS / DISRUPTIONS</h4><p><strong>Time Lost:</strong> '+totalHrs+' hrs</p><p>'+delayText.replace(/\n/g,"<br>")+'</p><hr>'+
'<h4>9.0 MEETINGS</h4><p>'+(meetText||"None").replace(/\n/g,"<br>")+'</p><hr>'+
'<h4>10.0 GENERAL REMARKS</h4><p>Work is progressing in accordance with the approved programme and specifications unless otherwise noted.</p><hr>'+
'<div style="display:flex;justify-content:space-between;margin-top:10px">'+
'<div style="text-align:center">_________________<br><b>'+(D.cowName||"[COW Name]")+'</b><br><small>Clerk of Works</small><br>Date: '+rdate()+'</div>'+
'<div style="text-align:center">_________________<br><b>'+(D.contractorRepName||"[Contractor Rep]")+'</b><br><small>Contractors Representative</small><br>Date: ................</div>'+
'</div>'+
'<p style="text-align:center;font-size:8px;margin-top:10px">Generated by Construction Manager | '+rn+' | '+reportDate+'</p>'+
'</div>'+
'<p style="color:#ff9f0a;margin-top:8px;text-align:center;font-size:11px">Click anywhere on the report to edit directly before printing.</p>';
};

function saveReport(){if(!D.savedReports)D.savedReports=[];D.savedReports.push({id:uid(),date:reportDate,timestamp:Date.now()});save();toast("Report saved!");go("report");}
